<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        margin: 0;
        overflow: hidden;
        background: #0a0e14;
      }

      body {
        font-family:
          "SF Pro Display",
          Arial,
          sans-serif;
        color: #e6edf3;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0e14;
      }

      .scene {
        position: absolute;
        inset: 0;
        display: flex;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0e14;
        opacity: 0;
      }

      .scene-content {
        position: relative;
        z-index: 5;
        width: 100%;
        height: 100%;
        padding: 70px 86px;
      }

      .grain,
      .grid-bg,
      .glow-a,
      .glow-b,
      .scan-bars {
        position: absolute;
        pointer-events: none;
      }

      .grain {
        inset: 0;
        z-index: 30;
        opacity: 0.06;
        background-image:
          radial-gradient(circle at 25% 25%, rgba(230, 237, 243, 0.22) 0 1px, rgba(230, 237, 243, 0) 1px),
          radial-gradient(circle at 75% 75%, rgba(91, 141, 239, 0.16) 0 1px, rgba(91, 141, 239, 0) 1px);
        background-size: 19px 19px, 23px 23px;
        mix-blend-mode: screen;
      }

      .grid-bg {
        inset: -100px;
        z-index: 0;
        opacity: 0.24;
        background-image:
          linear-gradient(rgba(91, 141, 239, 0.18) 1px, rgba(91, 141, 239, 0) 1px),
          linear-gradient(90deg, rgba(91, 141, 239, 0.14) 1px, rgba(91, 141, 239, 0) 1px);
        background-size: 90px 90px;
      }

      .glow-a {
        width: 760px;
        height: 760px;
        left: -180px;
        top: -210px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(91, 141, 239, 0.22), rgba(91, 141, 239, 0) 65%);
      }

      .glow-b {
        width: 680px;
        height: 680px;
        right: -170px;
        bottom: -220px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(63, 185, 80, 0.12), rgba(63, 185, 80, 0) 68%);
      }

      .scan-bars {
        inset: 0;
        z-index: 6;
        opacity: 0.24;
        background:
          linear-gradient(90deg, rgba(91, 141, 239, 0) 0%, rgba(91, 141, 239, 0.28) 48%, rgba(91, 141, 239, 0) 54%) 0 0 / 420px 100%,
          linear-gradient(180deg, rgba(230, 237, 243, 0.06) 1px, rgba(230, 237, 243, 0) 1px) 0 0 / 100% 54px;
      }

      .screenshot-shell {
        position: absolute;
        overflow: hidden;
        border: 1px solid #2d3748;
        border-radius: 8px;
        background: #111620;
        box-shadow:
          0 34px 100px rgba(0, 0, 0, 0.52),
          0 0 0 1px rgba(91, 141, 239, 0.08),
          0 0 52px rgba(91, 141, 239, 0.16);
        transform-style: preserve-3d;
      }

      .screenshot-shell img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .hero-shot {
        left: 170px;
        top: 116px;
        width: 1580px;
        height: 888px;
      }

      .orders-shot {
        right: 84px;
        top: 118px;
        width: 1280px;
        height: 720px;
      }

      .prod-shot {
        left: 145px;
        top: 138px;
        width: 1630px;
        height: 690px;
      }

      .delivery-shot {
        left: 92px;
        top: 210px;
        width: 825px;
        height: 466px;
      }

      .statement-shot {
        right: 92px;
        top: 320px;
        width: 825px;
        height: 466px;
      }

      .brand-mark {
        position: absolute;
        z-index: 12;
        display: grid;
        grid-template-columns: repeat(2, 18px);
        grid-template-rows: repeat(2, 18px);
        gap: 8px;
        width: 70px;
        height: 70px;
        padding: 13px;
        border: 1px solid #2d3748;
        border-radius: 8px;
        background: #1b2231;
        box-shadow: 0 0 32px rgba(91, 141, 239, 0.24);
      }

      .brand-mark span {
        border: 2px solid #5b8def;
        border-radius: 4px;
      }

      .scene-label {
        margin: 0 0 8px;
        color: #5b8def;
        font-size: 18px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .headline {
        position: absolute;
        z-index: 14;
        max-width: 940px;
        color: #e6edf3;
        font-size: 76px;
        font-weight: 900;

      .word {

      .alert-line {

        background: #f85149;

      .module-chip {
        position: absolute;

        justify-content: center;

        height: 54px;

        border-radius: 8px;

      .module-chip.active {

      }

      .connector-svg {
        position: absolute;

        z-index: 15;
        overflow: visible;
      }

      .connector-path {
        fill: none;
        stroke: #5b8def;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-dasharray: 1200;
        stroke-dashoffset: 1200;
        filter: drop-shadow(0 0 12px rgba(91, 141, 239, 0.52));
      }

      .counter-wrap {
        position: absolute;
        z-index: 18;
        left: 125px;
        right: 125px;
        top: 210px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 24px;

      .counter-card {
        min-height: 330px;
        border: 1px solid #2d3748;
        border-radius: 8px;
        padding: 42px 34px;
        background: rgba(17, 22, 32, 0.86);
        box-shadow: 0 28px 74px rgba(0, 0, 0, 0.46);

      .counter-value {

        line-height: 0.95;

      }

      .counter-label {
        display: block;
        margin-top: 18px;
        color: #b0b8c4;
        font-size: 24px;
        font-weight: 800;
      }

      .counter-rule {
        display: block;
        width: 100%;
        height: 4px;
        margin-top: 38px;
        border-radius: 999px;
        background: #5b8def;
        box-shadow: 0 0 22px rgba(91, 141, 239, 0.58);
        transform-origin: left center;
      }

      .status-dots {
        position: absolute;
        z-index: 19;
        left: 50%;
        bottom: 160px;
        display: flex;
        gap: 16px;
        width: 260px;
        justify-content: center;
        margin-left: -130px;
      }

      .dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
      }

      .dot.red {
        background: #f85149;
        box-shadow: 0 0 24px rgba(248, 81, 73, 0.62);
      }

      .dot.amber {
        background: #d29922;
        box-shadow: 0 0 24px rgba(210, 153, 34, 0.58);
      }

      .dot.green {
        background: #3fb950;
        box-shadow: 0 0 24px rgba(63, 185, 80, 0.58);
      }

      .route-path {
        fill: none;
        stroke: #5b8def;
        stroke-width: 7;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 1600;
        stroke-dashoffset: 1600;
        filter: drop-shadow(0 0 14px rgba(91, 141, 239, 0.64));
      }

      .action-now {
        position: absolute;
        z-index: 20;
        left: 675px;
        top: 756px;

      .lockup {

        left: 250px;

        grid-template-columns: 84px minmax(0, 1fr);
        gap: 28px;
        align-items: center;
        width: 950px;
        padding: 42px;
        border: 1px solid #2d3748;
        border-radius: 8px;
        background: rgba(17, 22, 32, 0.78);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(9px);
      }

      .lockup .brand-mark {
        position: relative;
        left: auto;
        top: auto;
      }

      .product-name {
        margin: 0;
        color: #e6edf3;
        font-size: 74px;
        font-weight: 950;
        line-height: 0.95;
      }

      .promise {
        grid-column: 1 / -1;
        margin: 10px 0 0;
        color: #b0b8c4;
        font-size: 36px;
        font-weight: 700;
      }

      .promise-rule {
        grid-column: 1 / -1;
        width: 100%;
        height: 5px;
        border-radius: 999px;
        background: #5b8def;
        transform-origin: left center;
      }

      .final-dip {
        position: absolute;
        inset: 0;
        z-index: 40;
        background: #0a0e14;
        opacity: 0;
      }
    </style>
  </head>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      const DURATION = 20.5;

      function showScene(selector, time) {
        tl.set(selector, { opacity: 1, visibility: "visible" }, time);
      }

      function hideScene(selector, time) {
        tl.set(selector, { opacity: 0, visibility: "hidden" }, time);
      }

      function blurIn(selector, time, duration) {
        tl.fromTo(selector, { opacity: 0, filter: "blur(18px)", scale: 1.025 }, { opacity: 1, filter: "blur(0px)", scale: 1, duration, ease: "sine.inOut" }, time);
      }

      function zoomTransition(outScene, inScene, time) {
        tl.to(outScene, { scale: 1.12, filter: "blur(10px)", opacity: 0.25, duration: 0.35, ease: "power3.inOut" }, time);
        tl.set(outScene, { opacity: 0, visibility: "hidden", scale: 1, filter: "blur(0px)" }, time + 0.36);
        showScene(inScene, time + 0.05);
        tl.fromTo(inScene, { scale: 0.9, filter: "blur(12px)", opacity: 0 }, { scale: 1, filter: "blur(0px)", opacity: 1, duration: 0.6, ease: "power3.out" }, time + 0.05);
      }

      function pushTransition(outScene, inScene, time) {
        tl.to(outScene, { x: -250, filter: "blur(12px)", opacity: 0.18, duration: 0.35, ease: "power3.in" }, time);
        tl.set(outScene, { opacity: 0, visibility: "hidden", x: 0, filter: "blur(0px)" }, time + 0.36);
        showScene(inScene, time);
        tl.fromTo(inScene, { x: 250, filter: "blur(12px)", opacity: 0 }, { x: 0, filter: "blur(0px)", opacity: 1, duration: 0.55, ease: "power3.out" }, time);
      }

      function blockTransition(outScene, inScene, time) {
        tl.to(outScene, { y: -120, filter: "blur(8px)", opacity: 0, duration: 0.28, ease: "power4.in" }, time);
        tl.set(outScene, { opacity: 0, visibility: "hidden", y: 0, filter: "blur(0px)" }, time + 0.3);
        showScene(inScene, time + 0.05);
        tl.fromTo(inScene, { y: 96, opacity: 0, filter: "blur(8px)" }, { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.45, ease: "expo.out" }, time + 0.05);
      }

      function countNumber(el, start, end, duration, format) {
        const proxy = { value: start };
        tl.to(proxy, {
          value: end,
          duration,
          ease: "power3.out",
          onUpdate: function () {
            if (format === "currency") {
              el.textContent = "¥" + proxy.value.toLocaleString("en-US", { maximumFractionDigits: 0 });
            } else {
              el.textContent = Math.round(proxy.value).toLocaleString("en-US");
            }
          },
          onComplete: function () {
            if (format === "currency") {
              el.textContent = "¥54,141.79";
            } else {
              el.textContent = Math.round(end).toLocaleString("en-US");
            }
          },
        }, 9.72);
      }

      showScene("#scene-1", 0);
      tl.fromTo("#hero-shot", { scale: 0.92, y: 40, rotationY: -8, opacity: 0 }, { scale: 1.02, y: 0, rotationY: -3, opacity: 1, duration: 1.05, ease: "expo.out" }, 0.18);
      tl.fromTo("#brand-open", { scale: 0.72, opacity: 0, y: -18 }, { scale: 1, opacity: 1, y: 0, duration: 0.55, ease: "back.out(1.7)" }, 0.34);
      tl.fromTo("#headline-1 .word", { y: 52, opacity: 0, rotation: -2 }, { y: 0, opacity: 1, rotation: 0, duration: 0.52, stagger: 0.09, ease: "power3.out" }, 0.46);
      tl.fromTo(".alert-line", { scaleX: 0, opacity: 0 }, { scaleX: 1, opacity: 1, duration: 0.54, ease: "power2.out" }, 1.7);
      tl.to(".alert-line", { scaleY: 1.9, duration: 0.18, yoyo: true, repeat: 1, ease: "power1.inOut" }, 2.28);
      tl.to(".grid-bg", { x: -90, y: -45, duration: DURATION, ease: "none" }, 0);
